# =============================================================================
# rasx-cluster-analyzer 用設定
# クラスタリング・PCA・2D 埋め込み（t-SNE / UMAP）・HTML 出力の挙動をまとめる。
# 詳細は README.md / tips.md も参照。
# =============================================================================

[paths]
# HTML の出力先。未指定なら <rasx ディレクトリ>/cluster_map.html。
# 相対パスは「コマンド実行時のカレントディレクトリ」基準。絶対パスも可。
# output_html = "out/cluster_map.html"

# -----------------------------------------------------------------------------
# 2θ グリッド（度）。全スペクトルをこの等間隔グリッドへ線形補間して特徴行列を作る。
# -----------------------------------------------------------------------------
[grid]
# 補間範囲の下限・上限（度）。theta_min < theta_max であること。
theta_min = 20.0
theta_max = 80.0
# グリッド点数（>=2）。大きいほど解像度は上がるが列数も増える。
n_points = 601

# クラスタリング用特徴から除外する 2θ レンジ（任意）。表示用 XRD 図では全範囲のまま、灰色帯で示す。
# 形式: [[開始, 終了], ...] で、各レンジは start < end。
# 例: 基板ピークを特徴から外したいとき → [[26.4, 27.2], [54.1, 55.0]]
exclude_ranges = [[20, 30.0], [50, 80]]
# exclude_ranges = [[26.4, 27.2], [54.1, 55.0]]

# -----------------------------------------------------------------------------
# 前処理: 列方向 StandardScaler の「前」に、スペクトル（行）ごとに強度を規格化する。
# セクション省略時は l2 と同じ。
# -----------------------------------------------------------------------------
[preprocess]
# "l2" … 各行を L2 ノルムで割る（相対形状比較向き、既定相当）
# "max" … 各行の絶対値最大で割る（ピーク強度を揃えたいとき）
# "none" … 行方向はそのまま（強度差が残りやすい）
intensity_normalization = "l2"

# -----------------------------------------------------------------------------
# PCA: 列標準化後の行列に 1 回だけフィット。左パネルは常に PC1 vs PC2。
# 主成分の本数は t-SNE / UMAP の入力次元の上限にもなる（実際は min(設定, サンプル数, 特徴数)）。
# -----------------------------------------------------------------------------
[pca]
# 取る主成分数（整数 >= 2）。左図の軸は PC1/PC2 固定のまま、大きくすると多様体入力の情報量が増える。
n_components = 50
# 再現性用の乱数種（sklearn PCA の random_state）。同じ入力・同じ設定なら結果を揃えやすくする。
# PCA は内部ソルバ条件によってはこの値の影響が小さいこともあるが、固定しておくと比較しやすい。
random_state = 0

# -----------------------------------------------------------------------------
# 埋め込み: Plotly 上段「右パネル」の 2D 座標の出し方。
# method が tsne/umap のときは PCA 射影を入力に多様体を計算。pca2d のときは右も PC1 vs PC2（計算は軽い）。
# -----------------------------------------------------------------------------
[embedding]
# "tsne" … t-SNE 2D（右パネル）
# "umap" … UMAP 2D（右パネル）
# "pca2d" … 右パネルも PCA の PC1–PC2（多様体は計算しない）
method = "tsne"
# 出力次元。現状 HTML は 2D 固定のため 2 のみ許可。
n_components = 2

# embedding.method = "tsne" のとき使用。[embedding.tsne] テーブル自体の省略時はコード側デフォルトあり。
[embedding.tsne]
# 近傍スケールの目安。大きいほど大域、小さいほど局所。サンプル数に応じて自動で上限クリップされる。
perplexity = 10.0
# "auto" または正の数（学習率）。多くは "auto" のままでよい。
learning_rate = "auto"
# 反復回数。250 未満は不可（sklearn）。省略時はローダ既定（例: 1000）。
max_iter = 1500
# 初期配置や最適化の乱数種。固定すると t-SNE 図の再現性を取りやすい。
# 変えると見え方がかなり変わることがあるので、比較中は固定推奨。
random_state = 0

# embedding.method = "umap" のとき使用。テーブル省略時はコード側デフォルトあり。
[embedding.umap]
# 近傍点数（整数 >= 2）。小さめ→局所、大きめ→大域の傾向。サンプル数が少ないときは自動で抑えられる。
n_neighbors = 15
# 埋め込み空間での点の最小距離（>=0）。小さめで密集、大きめで広がりやすい。
min_dist = 0.1
# 距離尺度。UMAP / pynndescent が解釈できる名前を使う。
# 代表例:
#   "euclidean"  … 標準的。まずはこれから
#   "manhattan"  … 成分差の総和で見る。スパース/外れ値気味の差を見たいときの候補
#   "cosine"     … ベクトルの向き重視。ピーク強度よりパターン形状をより重視したいときの候補
#   "chebyshev"  … 最大差だけを強く見る
# まず "euclidean" で試し、形状類似を重視したいなら "cosine" も比較候補。
metric = "euclidean"
# UMAP の近傍グラフ構築と初期化の乱数種。固定すると配置比較がしやすい。
# 変えると局所構造の見え方が少し変わり得る。
random_state = 42

# -----------------------------------------------------------------------------
# DBSCAN: eps 距離内を密度領域とみなす。ラベル -1 はノイズ。
# clustering_space で「どの空間の距離」で eps を解釈するかを選ぶ。
# -----------------------------------------------------------------------------
[dbscan]
# 近傍半径。空間によってスケールが全然違うので、結果を見ながら調整するのが現実的。
eps = 4
# コア点とみなす最小近傍数（整数 >= 1）。大きいほど堅いクラスタ、小さいほど細かい塊が残る。
min_samples = 2
# "scaled" … 列標準化後の高次元特徴（既定の挙動に近い）
# "pca" … PCA 射影の全成分空間
# "embedding" … 右パネルと同じ 2D（method が tsne/umap/pca2d に対応した座標）
# "pca2d" … PC1 と PC2 のみ（右パネルが t-SNE でも、クラスタは PCA 平面基準になり得るので注意）
clustering_space = "embedding"

# -----------------------------------------------------------------------------
# 可視化: XRD プロファイル図のレイアウト
# -----------------------------------------------------------------------------
[visualize]
# 各 XRD 図の高さの下限（ピクセル）。実装ではこれを基準にさらに広めに取る。>= 120。
xrd_min_panel_height_px = 280
